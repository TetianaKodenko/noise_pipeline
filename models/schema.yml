version: 2

models:
  - name: stg_noise
    description: "Cleaned silver model where duplicates and null values are completely removed"
    columns:
      - name: DATE_TIME
        description: "Cleaned timestamp format used to track unique readings"
        tests:
          - unique
          - not_null

      - name: NOISE_LEVEL
        description: "Cleaned noise level value in decibels with nulls removed"
        tests:
          - not_null

  - name: last_10_minutes_noise
    description: "Final analytical gold table containing cleaned data filtered to the last 10 minutes for Tableau"
    columns:
      - name: DATE_TIME
        description: "Cleaned timestamp used by Tableau"
        tests:
          - unique
          - not_null

      - name: NOISE_LEVEL
        description: "The verified noise level values"
        tests:
          - not_null