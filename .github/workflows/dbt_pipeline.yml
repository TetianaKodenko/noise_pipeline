# Name of the workflow visible in the GitHub Actions UI
name: Run dbt pipeline

# Triggers for the workflow
on:
  schedule:
    # Runs the workflow every 15 minutes automatically to bypass GitHub rate limits
    - cron: '*/3 * * * *'
  # Allows manual triggering of the workflow
  workflow_dispatch:

# Defines the tasks to run
jobs:
  dbt-run:
    # Specifies the virtual machine environment
    runs-on: ubuntu-latest

    # The sequence of steps to execute
    steps:
      # Step 1: Downloads your project code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Installs Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Installs the dbt adapter
      - name: Install dbt-snowflake
        run: pip install dbt-snowflake

      # Step 4: Creates the .dbt directory and profiles.yml
      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          # Writes the configuration block into ~/.dbt/profiles.yml using environment secrets
          cat << EOF > ~/.dbt/profiles.yml
          noise_pipeline:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ACCOUNTADMIN
                database: NOISE_DB
                warehouse: noise_dbt_wh
                schema: NOISE_SCHEMA
                threads: 1
          EOF

      # Step 5: Executes dbt
      - name: Run dbt models
        run: dbt run
